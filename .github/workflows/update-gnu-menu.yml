name: Update GNU Menu Cache

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20,2 * * *"

permissions:
  contents: write

jobs:
  update-menu-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build menu cache
        run: node scripts/menu/build-gnu-menu.mjs --output data/gnu-menu.json

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gnu-menu.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh GNU menu cache"
          git push
